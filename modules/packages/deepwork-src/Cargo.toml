[package]
name = "deepwork"
version = "0.1.0"
edition = "2024"
description = "A focused deep work timer with polybar integration and TUI stats dashboard"
authors = ["Jack"]

[dependencies]
# CLI parsing
clap = { version = "4", features = ["derive"] }

# Database
rusqlite = { version = "0.32", features = ["bundled"] }

# Hashing (for safe sync conflict detection)
sha2 = "0.10"
hex = "0.4"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Config and serialization
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# XDG directories
directories = "5"

# Desktop notifications
notify-rust = "4"

# TUI
ratatui = "0.29"
crossterm = "0.28"

# Error handling
thiserror = "2"
anyhow = "1"

# IPC
serde_json = "1"

# Signal handling
ctrlc = "3"

[[bin]]
name = "deepwork"
path = "src/main.rs"
